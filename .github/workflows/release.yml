name: Release

# Build de instaladores para Windows e Linux ao publicar uma tag "vX.Y.Z".
# (best-effort — gerado pelo assistente; pode precisar de ajustes finos no 1º run.)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles nsis"
          - platform: ubuntu-22.04
            args: "--bundles deb,appimage"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Instalar dependências do Tauri (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Instalar deps do frontend
        run: npm install

      - name: Baixar sidecars (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/fetch-pandoc.ps1
          powershell -ExecutionPolicy Bypass -File scripts/fetch-llama.ps1

      - name: Baixar sidecars (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          bash scripts/fetch-pandoc.sh
          bash scripts/fetch-llama.sh

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LocalOffice ${{ github.ref_name }}"
          releaseBody: "Instaladores para Windows e Linux abaixo. Modelos GGUF não inclusos."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
