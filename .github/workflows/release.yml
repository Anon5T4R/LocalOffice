name: Release

# Build de instaladores para Windows e Linux ao publicar uma tag "vX.Y.Z".
# (best-effort — gerado pelo assistente; pode precisar de ajustes finos no 1º run.)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Serializa os jobs: os dois tentavam CRIAR o release na mesma tag ao mesmo
      # tempo e um perdia a corrida (already_exists) sem subir o artefato - mordeu
      # o LocalData v0.7.0 e o LocalAgenda v0.5.0. Com um job por vez, o primeiro
      # cria e o segundo anexa. Release ~2x mais lento, mas release nao e hot-path.
      max-parallel: 1
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles nsis"
          - platform: ubuntu-22.04
            args: "--bundles deb,appimage"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Instalar dependências do Tauri (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Instalar deps do frontend
        run: npm ci

      - name: Baixar sidecars (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/fetch-pandoc.ps1
          powershell -ExecutionPolicy Bypass -File scripts/fetch-llama.ps1

      - name: Baixar sidecars (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          bash scripts/fetch-pandoc.sh
          bash scripts/fetch-llama.sh

      - name: Cargo.lock em dia (--locked)
        working-directory: src-tauri
        run: cargo fetch --locked

      # A tagName so e preenchida em build de TAG. Fora de tag, `github.ref_name`
      # e o nome do BRANCH -- um `workflow_dispatch` da main criava uma release
      # chamada "main": lixo no repositorio, com o nome errado.
      #
      # O gate vai na tagName, NAO no passo: o tauri-action e quem CONSTROI o
      # app, nao so quem publica. Gatear o passo inteiro faria o disparo manual
      # nao buildar nada. Sem tagName o action so builda e sobe os artefatos --
      # que e exatamente o que um build de teste deve fazer.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "LocalOffice ${{ github.ref_name }}"
          releaseBody: "Instaladores para Windows e Linux abaixo. Modelos GGUF não inclusos."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
