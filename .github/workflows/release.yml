name: Release

# Build de instaladores para Windows e Linux ao publicar uma tag "vX.Y.Z".
# (best-effort — gerado pelo assistente; pode precisar de ajustes finos no 1º run.)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Serializa os jobs: os dois tentavam CRIAR o release na mesma tag ao mesmo
      # tempo e um perdia a corrida (already_exists) sem subir o artefato - mordeu
      # o LocalData v0.7.0 e o LocalAgenda v0.5.0. Com um job por vez, o primeiro
      # cria e o segundo anexa. Release ~2x mais lento, mas release nao e hot-path.
      max-parallel: 1
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles nsis"
          - platform: ubuntu-22.04
            args: "--bundles deb,appimage"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Instalar dependências do Tauri (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Instalar deps do frontend
        run: npm ci

      - name: Baixar sidecars (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/fetch-pandoc.ps1
          powershell -ExecutionPolicy Bypass -File scripts/fetch-llama.ps1

      - name: Baixar sidecars (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          bash scripts/fetch-pandoc.sh
          bash scripts/fetch-llama.sh

      - name: Cargo.lock em dia (--locked)
        working-directory: src-tauri
        run: cargo fetch --locked

      # A tagName so e preenchida em build de TAG. Fora de tag, `github.ref_name`
      # e o nome do BRANCH -- um `workflow_dispatch` da main criava uma release
      # chamada "main": lixo no repositorio, com o nome errado.
      #
      # O gate vai na tagName, NAO no passo: o tauri-action e quem CONSTROI o
      # app, nao so quem publica. Gatear o passo inteiro faria o disparo manual
      # nao buildar nada. Sem tagName o action so builda e sobe os artefatos --
      # que e exatamente o que um build de teste deve fazer.
      - uses: tauri-apps/tauri-action@v0
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "LocalOffice ${{ github.ref_name }}"
          releaseBody: "Instaladores para Windows e Linux abaixo. Modelos GGUF não inclusos."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # O upload do tauri-action nao tem retentativa: ele builda e publica no
      # MESMO passo, entao um tropeco momentaneo do GitHub joga fora 15 min de
      # build e deixa a release pela metade (aconteceu em 2026-07-19, com
      # "Error creating policy" em 5 apps de uma vez, durante um incidente do
      # Actions - os binarios estavam prontos, so o upload caiu).
      #
      # Este passo so roda quando o de cima falha, e reaproveita o que JA foi
      # compilado: nada e rebuildado.
      - name: Publicar artefato (retentativa)
        if: failure() && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          arq=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe \
                   src-tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)
          if [ -z "$arq" ]; then
            echo "::error::sem artefato - a falha foi no BUILD, nao no upload"
            exit 1
          fi
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" \
                 --title "${{ github.event.repository.name }} $GITHUB_REF_NAME" \
                 --notes "Instaladores anexados abaixo."
          for t in 1 2 3 4 5; do
            if gh release upload "$GITHUB_REF_NAME" "$arq" --clobber; then
              echo "publicado na tentativa $t"
              exit 0
            fi
            echo "tentativa $t falhou; esperando $((t * 20))s"
            sleep $((t * 20))
          done
          echo "::error::upload falhou 5 vezes seguidas"
          exit 1

  # Uma release com metade dos instaladores PARECE completa pra quem baixa -
  # foi assim que Calc e Monitor ficaram so com o .exe e o Clip so com o
  # AppImage, sem nada gritando. Este job existe pra que isso nunca passe
  # calado: ou os dois estao la, ou o release fica vermelho.
  verificar:
    needs: release
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Os 2 instaladores estao na release?
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          nomes=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                    --json assets -q '.assets[].name' 2>/dev/null)
          echo "Anexos na release:"
          echo "${nomes:-(nenhum)}"
          falta=0
          echo "$nomes" | grep -q -- '-setup\.exe$' \
            || { echo "::error::falta o instalador do Windows"; falta=1; }
          echo "$nomes" | grep -q -- '\.AppImage$' \
            || { echo "::error::falta o AppImage"; falta=1; }
          exit $falta
